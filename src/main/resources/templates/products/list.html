<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <title>Danh sách sản phẩm</title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-secondary">Danh sách sản phẩm</h2>
        <a th:href="@{/products/add}" class="btn btn-primary shadow-sm">+ Thêm sản phẩm</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0 text-center align-middle">
                <thead class="table-dark">
                <tr>
                    <th class="py-3">ID</th>
                    <th>Hình ảnh</th>
                    <th>Tên sản phẩm</th>
                    <th>Giá (VNĐ)</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${products}">
                    <td class="fw-bold text-muted" th:text="${p.id}"></td>
                    <td>
                        <img th:src="${p.image}" class="img-thumbnail shadow-sm" style="width: 80px; height: 80px; object-fit: cover;" alt="product"/>
                    </td>
                    <td class="fw-bold text-primary" th:text="${p.name}"></td>
                    <td class="text-danger fw-bold" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                    <td>
                        <a th:href="@{/products/edit/{id}(id=${p.id})}" class="btn btn-sm btn-outline-warning mx-1">Sửa</a>
                        <a th:href="@{/products/delete/{id}(id=${p.id})}" class="btn btn-sm btn-outline-danger mx-1"
                           onclick="return confirm('Ông có chắc chắn muốn xóa sản phẩm này không?')">Xóa</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="5" class="text-center py-4 text-muted">Chưa có sản phẩm nào trong cửa hàng.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
