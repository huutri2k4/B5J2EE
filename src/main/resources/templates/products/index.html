<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .custom-header {
            background-color: #5a5c69;
            color: white;
            padding: 10px 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="custom-header">
    <h4 class="m-0">Home Products</h4>
</div>

<div class="container">
    <a th:href="@{/products/create}" class="btn btn-primary mb-3">Create New Product</a>

    <table class="table table-bordered table-hover align-middle text-center">
        <thead class="table-light">
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Price</th>
            <th>Image</th>
            <th>Category Name</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="prod : ${products}">
            <td th:text="${prod.id}"></td>
            <td th:text="${prod.name}"></td>
            <td th:text="${prod.price}"></td>
            <td>
                <img th:src="@{'/images/' + ${prod.imageFileName}}" width="80" alt="Product Image" class="img-thumbnail">
            </td>
            <td th:text="${prod.category}"></td>
            <td>
                <a th:href="@{/products/edit/{id}(id=${prod.id})}" class="btn btn-secondary btn-sm">Edit</a>
                <a th:href="@{/products/delete/{id}(id=${prod.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này?');">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
